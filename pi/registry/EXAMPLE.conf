# Per-project deploy config. Copy this to <project>.conf and edit.
# The <project> name is what you pass to the timer: pi-deploy@<project>.timer
#
# Example for the Telegram bot:
#   cp EXAMPLE.conf telegram.conf   # then edit the values below

# Git remote to deploy from. Use SSH so the Pi auths with its deploy key.
REPO=git@github.com:spratths/imessage-claude.git

# The systemd --user service to restart after a successful deploy.
SERVICE=telegram-bot.service

# Test command run against the NEW commit before promoting. Leave empty to
# skip (not recommended). Runs from the repo root of an isolated worktree.
TEST_CMD=python -m pytest

# Branch to track. Defaults to main if omitted.
BRANCH=main
